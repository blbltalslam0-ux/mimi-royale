<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Battle Royale 3D</title>

<style>

body{
margin:0;
overflow:hidden;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
font-family:Arial;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:30px;
}

</style>

</head>

<body>

<div id="ui">
Health: <span id="hp">100</span>
</div>

<div id="crosshair">+</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>

let scene = new THREE.Scene()
scene.background = new THREE.Color(0x87ceeb)

let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,2000)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(50,100,50)
scene.add(light)

scene.add(new THREE.AmbientLight(0x888888))

let floorGeo = new THREE.PlaneGeometry(2000,2000)
let floorMat = new THREE.MeshStandardMaterial({color:0x2e7d32})
let floor = new THREE.Mesh(floorGeo,floorMat)
floor.rotation.x = -Math.PI/2
scene.add(floor)

let controls = new THREE.PointerLockControls(camera,document.body)

document.body.addEventListener("click",()=>{
controls.lock()
})

let move = {w:false,a:false,s:false,d:false}

document.addEventListener("keydown",e=>{
if(e.key=="w") move.w=true
if(e.key=="s") move.s=true
if(e.key=="a") move.a=true
if(e.key=="d") move.d=true
})

document.addEventListener("keyup",e=>{
if(e.key=="w") move.w=false
if(e.key=="s") move.s=false
if(e.key=="a") move.a=false
if(e.key=="d") move.d=false
})

let enemies=[]

function spawnEnemy(){

let geo = new THREE.BoxGeometry(2,4,2)
let mat = new THREE.MeshStandardMaterial({color:"red"})
let enemy = new THREE.Mesh(geo,mat)

enemy.position.set(
(Math.random()-0.5)*500,
2,
(Math.random()-0.5)*500
)

scene.add(enemy)

enemies.push(enemy)

}

for(let i=0;i<10;i++) spawnEnemy()

let raycaster = new THREE.Raycaster()

document.addEventListener("click",shoot)

function shoot(){

raycaster.setFromCamera(new THREE.Vector2(0,0),camera)

let hit = raycaster.intersectObjects(enemies)

if(hit.length>0){

let enemy = hit[0].object

scene.remove(enemy)

enemies.splice(enemies.indexOf(enemy),1)

spawnEnemy()

}

}

let velocity = new THREE.Vector3()

let zoneRadius = 400

function updateMovement(){

let speed = 0.5

velocity.set(0,0,0)

if(move.w) velocity.z -= speed
if(move.s) velocity.z += speed
if(move.a) velocity.x -= speed
if(move.d) velocity.x += speed

controls.moveRight(velocity.x)
controls.moveForward(velocity.z)

}

let health = 100

function updateEnemies(){

enemies.forEach(e=>{

let dx = camera.position.x - e.position.x
let dz = camera.position.z - e.position.z

e.position.x += dx*0.002
e.position.z += dz*0.002

let dist = Math.sqrt(dx*dx+dz*dz)

if(dist<3){

health -= 0.1

document.getElementById("hp").innerText = Math.floor(health)

if(health<=0){

alert("Game Over")

location.reload()

}

}

})

}

function updateZone(){

zoneRadius -= 0.01

let dist = Math.sqrt(
camera.position.x*camera.position.x +
camera.position.z*camera.position.z
)

if(dist>zoneRadius){

health -= 0.2

}

}

function animate(){

requestAnimationFrame(animate)

updateMovement()

updateEnemies()

updateZone()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
