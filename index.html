<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Royale</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
canvas { display: block; }
</style>
</head>
<body>

<canvas></canvas>

<script>
const canvas = document.querySelector("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let worldWidth = 3000;
let worldHeight = 3000;

let keys = {};
let bullets = [];
let enemies = [];
let kills = 0;
let gameOver = false;
let mouseDown = false;
let zoneRadius = 1200;

let player = {
    x: worldWidth / 2,
    y: worldHeight / 2,
    size: 30,
    speed: 5,
    hp: 100
};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
document.addEventListener("mousedown", () => mouseDown = true);
document.addEventListener("mouseup", () => mouseDown = false);

let mouseX = 0;
let mouseY = 0;

canvas.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function spawnEnemy() {
    enemies.push({
        x: Math.random() * worldWidth,
        y: Math.random() * worldHeight,
        size: 30,
        speed: 1 + Math.random() * 2
    });
}

setInterval(spawnEnemy, 2000);

function shoot() {
    bullets.push({
        x: player.x,
        y: player.y,
        dx: (mouseX - canvas.width/2) / 15,
        dy: (mouseY - canvas.height/2) / 15
    });
}

function movePlayer() {
    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;

    player.x = Math.max(0, Math.min(worldWidth, player.x));
    player.y = Math.max(0, Math.min(worldHeight, player.y));
}

function updateZone() {
    zoneRadius -= 0.05;

    let dx = player.x - worldWidth/2;
    let dy = player.y - worldHeight/2;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > zoneRadius) {
        player.hp -= 0.2;
    }
}

function gameLoop() {
    if (gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    movePlayer();
    updateZone();

    if (mouseDown) shoot();

    let cameraX = player.x - canvas.width/2;
    let cameraY = player.y - canvas.height/2;

    ctx.beginPath();
    ctx.arc(worldWidth/2 - cameraX, worldHeight/2 - cameraY, zoneRadius, 0, Math.PI*2);
    ctx.strokeStyle = "purple";
    ctx.lineWidth = 5;
    ctx.stroke();

    ctx.fillStyle = "blue";
    ctx.fillRect(player.x - cameraX, player.y - cameraY, player.size, player.size);

    ctx.fillStyle = "yellow";
    bullets.forEach(b => {
        b.x += b.dx;
        b.y += b.dy;
        ctx.fillRect(b.x - cameraX, b.y - cameraY, 6, 6);
    });

    enemies.forEach((enemy, eIndex) => {
        let dx = player.x - enemy.x;
        let dy = player.y - enemy.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        enemy.x += (dx/dist) * enemy.speed;
        enemy.y += (dy/dist) * enemy.speed;

        ctx.fillStyle = "red";
        ctx.fillRect(enemy.x - cameraX, enemy.y - cameraY, enemy.size, enemy.size);

        if (
            player.x < enemy.x + enemy.size &&
            player.x + player.size > enemy.x &&
            player.y < enemy.y + enemy.size &&
            player.y + player.size > enemy.y
        ) {
            player.hp -= 0.5;
        }

        bullets.forEach((bullet, bIndex) => {
            if (
                bullet.x < enemy.x + enemy.size &&
                bullet.x + 6 > enemy.x &&
                bullet.y < enemy.y + enemy.size &&
                bullet.y + 6 > enemy.y
            ) {
                enemies.splice(eIndex, 1);
                bullets.splice(bIndex, 1);
                kills++;
            }
        });
    });

    ctx.fillStyle = "white";
    ctx.fillRect(20, 20, player.hp * 2, 20);
    ctx.strokeStyle = "white";
    ctx.strokeRect(20, 20, 200, 20);
    ctx.fillText("Kills: " + kills, 20, 70);

    if (player.hp <= 0) {
        gameOver = true;
        ctx.font = "60px Arial";
        ctx.fillText("GAME OVER", canvas.width/2 - 200, canvas.height/2);
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
